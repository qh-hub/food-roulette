<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>今天吃什么 - 美食轮盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 50%,#0d0d2b 100%);
  min-height:100vh;min-height:100dvh;color:#fff;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 10px 0;overflow-x:hidden;
}
.app{max-width:450px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
h1{
  font-size:24px;font-weight:800;letter-spacing:1px;
  background:linear-gradient(135deg,#f093fb,#f5576c,#4facfe);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  padding:8px 0 2px;
}
.sub{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-bottom:2px}
.wheel-wrap{
  position:relative;width:min(80vw,380px);height:min(80vw,380px);
  margin:0 auto 4px;flex-shrink:0;
}
#cv{
  width:100%;height:100%;border-radius:50%;position:relative;z-index:1;
  box-shadow:0 0 40px rgba(79,172,254,0.08),0 0 80px rgba(240,147,251,0.04);
}
.pointer{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);z-index:10;
  width:0;height:0;
  border-left:14px solid transparent;border-right:14px solid transparent;
  border-top:28px solid #ff4757;
  filter:drop-shadow(0 2px 8px rgba(255,71,87,0.6));
}
.pointer::after{
  content:"";position:absolute;top:-32px;left:-7px;
  width:14px;height:14px;background:#ff4757;border-radius:50%;
  box-shadow:0 0 10px rgba(255,71,87,0.5);
}
.center-btn{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:68px;height:68px;border-radius:50%;z-index:5;cursor:pointer;
  background:radial-gradient(circle at 35% 35%,#2d2d5e,#15152a);
  border:2px solid rgba(255,255,255,0.15);box-shadow:0 0 25px rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;user-select:none;-webkit-tap-highlight-color:transparent;
  transition:all 0.15s;
}
.center-btn:active{transform:translate(-50%,-50%) scale(0.9)}
.badge{
  position:absolute;bottom:-4px;right:-4px;z-index:6;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);
  padding:3px 10px;border-radius:20px;font-size:11px;
  border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);
}
.btn-row{display:flex;gap:8px;width:100%;justify-content:center;flex-wrap:wrap;margin:2px 0}
.btn-spin{
  padding:10px 28px;font-size:15px;font-weight:700;border:none;border-radius:50px;
  color:#fff;cursor:pointer;transition:all 0.25s;
  letter-spacing:1px;user-select:none;-webkit-tap-highlight-color:transparent;
  background:linear-gradient(135deg,#f093fb,#f5576c);
  box-shadow:0 4px 20px rgba(245,87,108,0.3);flex:1;max-width:200px;
}
.btn-spin:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(245,87,108,0.45)}
.btn-spin:active{transform:translateY(0)}
.btn-spin:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
.result-card{
  width:100%;padding:10px 16px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;text-align:center;
  backdrop-filter:blur(10px);min-height:48px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin:2px 0;
}
.result-label{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:2px;flex-shrink:0}
.result-name{
  font-size:20px;font-weight:700;
  background:linear-gradient(135deg,#f093fb,#f5576c,#4facfe);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.result-name.pop{animation:popUp 0.5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popUp{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.history-header{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:6px 2px 4px;
}
.history-title{font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:1px}
.history-clear{
  font-size:11px;color:rgba(255,255,255,0.25);cursor:pointer;
  padding:3px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);
  transition:all 0.2s;background:rgba(255,255,255,0.03);
}
.history-clear:hover{color:#ff6b6b;border-color:rgba(255,107,107,0.3)}
.history-list{
  width:100%;display:flex;flex-direction:column;gap:4px;
  max-height:260px;overflow-y:auto;padding:0 2px;
}
.history-list::-webkit-scrollbar{width:3px}
.history-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.history-empty{font-size:13px;color:rgba(255,255,255,0.2);padding:12px 0}
.history-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);
  border-radius:12px;cursor:pointer;transition:all 0.2s;
  text-decoration:none;color:inherit;
}
.history-item:hover{
  background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.1);
  transform:translateX(4px);
}
.history-idx{font-size:11px;font-weight:600;color:rgba(255,255,255,0.2);min-width:24px;text-align:right}
.history-name{font-size:14px;font-weight:500;flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-time{font-size:11px;color:rgba(255,255,255,0.2);flex-shrink:0}
.history-link{font-size:13px;flex-shrink:0;opacity:0.5;transition:opacity 0.2s}
.history-item:hover .history-link{opacity:1}
.modal{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(16px);
  align-items:center;justify-content:center;padding:24px;
}
.modal.show{display:flex}
.modal-box{
  background:linear-gradient(145deg,#1c1c42,#28285a);
  border-radius:28px;padding:36px 32px 28px;max-width:360px;width:100%;
  text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.06);
  animation:modalIn 0.4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes modalIn{0%{transform:scale(0.6) translateY(40px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
.modal-emoji{font-size:52px;margin-bottom:8px}
.modal-label{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:4px;text-transform:uppercase}
.modal-name{font-size:28px;font-weight:800;margin:8px 0 16px;
  background:linear-gradient(135deg,#f093fb,#f5576c,#4facfe);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.modal-link{
  display:inline-block;padding:10px 28px;
  background:rgba(79,172,254,0.1);color:#4facfe;
  text-decoration:none;border-radius:50px;font-size:14px;
  border:1px solid rgba(79,172,254,0.2);transition:all 0.3s;
}
.modal-link:hover{background:rgba(79,172,254,0.2)}
.modal-actions{display:flex;gap:8px;justify-content:center;margin-top:16px}
.modal-btn{
  flex:1;padding:10px;border-radius:50px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:#fff;cursor:pointer;font-size:13px;transition:all 0.2s;
}
.modal-btn:hover{background:rgba(255,255,255,0.1)}
.modal-btn.primary{background:linear-gradient(135deg,#f093fb,#f5576c);border:none;font-weight:700}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  100%{transform:translateY(100vh) rotate(900deg) scale(0.2);opacity:0}
}
</style>

d":"58"},{"cn":"粗粒小麦粉意面","eng":"Semolina pasta","id":"98"},{"cn":"手抓饼","eng":"Shouzhua Bing","id":"89"},{"cn":"水煮鱼","eng":"Boiled Fish","id":"71"},{"cn":"金针菇汤","eng":"Enoki mushroom soup","id":"10"},{"cn":"长岛冰茶","eng":"Long Island Iced Tea","id":"52"},{"cn":"冬瓜茶","eng":"Winter Melon Tea","id":"61"},{"cn":"吐司果酱","eng":"Toast Jam","id":"81"},{"cn":"微波炉蛋糕","eng":"Microwave Cake","id":"87"},{"cn":"桂圆红枣粥","eng":"Longan and Red Date Porridge","id":"88"},{"cn":"空气炸锅吐司","eng":"Air Fryer Toast","id":"86"},{"cn":"糖醋汁","eng":"Sweet and Sour Sauce","id":"20"},{"cn":"燕麦鸡蛋饼","eng":"Oatmeal and Egg Pancake","id":"94"},{"cn":"白粥","eng":"Rice Porridge","id":"2"},{"cn":"西红柿牛肉蛋花汤","eng":"Tomato Beef Egg Drop Soup","id":"11"},{"cn":"速冻馄饨","eng":"Frozen Wonton","id":"99"},{"cn":"咖喱炒蟹","eng":"Curry Crab Stir-fry","id":"70"},{"cn":"煮玉米","eng":"Boiled Corn","id":"92"},{"cn":"莫吉托","eng":"Mojito","id":"56"},{"cn":"牛奶燕麦","eng":"Milk Oatmeal","id":"80"},{"cn":"炒年糕","eng":"Egg-fried Rice Cakes","id":"73"},{"cn":"咖喱牛肉","eng":"Curry Beef","id":"316"},{"cn":"杨枝甘露","eng":"Mango Pomelo Sago","id":"59"},{"cn":"红烧鱼","eng":"Braised Fish","id":"64"},{"cn":"黄油煎虾","eng":"Shrimp sautéed in butter","id":"0"},{"cn":"芥末黄油罗氏虾","eng":"Mustard Butter Rosé Shrimp","id":"0"},{"cn":"响油鳝丝","eng":"Sautéed Eel Shreds with Aromatics","id":"0"}];
var n = R.length;
var recipeNames = R.map(function(x) { return x.cn; });
var recipeIdMap = {};
for (var i = 0; i < n; i++) recipeIdMap[R[i].cn] = R[i].id;

var COLORS = [
  "#FF6B6B","#4ECDC4","#45B7D1","#96CEB4","#FFE66D","#DDA0DD",
  "#98D8C8","#F7DC6F","#BB8FCE","#85C1E9","#F8C471","#82E0AA",
  "#F1948A","#73C6B6","#E59866","#A3E4D7","#FAD7A0","#D7BDE2",
  "#A9CCE3","#AED6F1","#F9E79F","#ABEBC6","#F5B7B1","#A9DFBF",
  "#FADBD8","#D2B4DE","#A3C1AD","#F0B27A","#AEB6BF","#D5DBDB"
];
function getColor(i) { return COLORS[i % COLORS.length]; }

var canvas = document.getElementById("cv");
var ctx = canvas.getContext("2d");
var currentAngle = 0;
var isSpinning = false;
var historyList = [];

function resizeCanvas() {
  var rect = canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  var size = Math.round(rect.width * dpr);
  if (canvas.width !== size || canvas.height !== size) {
    canvas.width = size;
    canvas.height = size;
    drawWheel();
  }
}

function drawWheel() {
  var w = canvas.width;
  var h = canvas.height;
  var cx = w / 2;
  var cy = h / 2;
  var r = Math.min(w, h) / 2 - 16;
  var sliceAngle = 2 * Math.PI / n;

  ctx.clearRect(0, 0, w, h);

  for (var i = 0; i < n; i++) {
    var start = currentAngle + i * sliceAngle;
    var end = start + sliceAngle;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = getColor(i);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 2;
    ctx.stroke();

    var mid = start + sliceAngle / 2;
    var textR = r * 0.6;
    var tx = cx + Math.cos(mid) * textR;
    var ty = cy + Math.sin(mid) * textR;

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid);

    var fontSize = Math.round(r * 0.055);
    ctx.font = "bold " + fontSize + "px PingFang SC,Microsoft YaHei,sans-serif";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(255,255,255,0.92)";

    var label = R[i].cn;
    var maxWidth = r * 0.65;
    while (ctx.measureText(label).width > maxWidth && label.length > 1) {
      label = label.slice(0, -1);
    }
    ctx.fillText(label, r * 0.26, 0);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.fill();
}

function getSelected() {
  var a = ((-Math.PI / 2 - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  var idx = Math.floor(a / (2 * Math.PI / n)) % n;
  return { idx: idx, name: recipeNames[idx], id: recipeIdMap[recipeNames[idx]] };
}

function addHistory(item) {
  var now = new Date();
  var time = String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
  historyList.unshift({ name: item.name, id: item.id, time: time });
  renderHistory();
}

function renderHistory() {
  var el = document.getElementById("hl");
  if (historyList.length === 0) {
    el.innerHTML = "<div class='history-empty'>还没有记录，转一转吧 🎲</div>";
    return;
  }
  var html = "";
  for (var i = 0; i < historyList.length; i++) {
    var item = historyList[i];
    var idx = recipeNames.indexOf(item.name);
    var color = idx >= 0 ? getColor(idx) : "#fff";
    var url = "https://howtocook.aiursoft.com/Recipes/Detail/" + item.id;
    html += "<a class='history-item' href='" + url + "' target='_blank'>";
    html += "<span class='history-idx'>#" + (i + 1) + "</span>";
    html += "<span class='history-name' style='color:" + color + "'>" + item.name + "</span>";
    html += "<span class='history-time'>" + item.time + "</span>";
    html += "<span class='history-link'>🔗</span>";
    html += "</a>";
  }
  el.innerHTML = html;
}

function showModal(item) {
  document.getElementById("modalName").textContent = item.name;
  document.getElementById("modalLink").href = "https://howtocook.aiursoft.com/Recipes/Detail/" + item.id;
  var foods = ["🍲","🍝","🍕","🍜","🍪","🍫","🍨","🍤","🍳","🍯","🍰","🍱","🍞","🍙","🍟","🍵","🍥","🍣","🍟","🍤","🍗","🍖","🍔","🍭"];
  document.getElementById("modalEmoji").textContent = foods[Math.floor(Math.random() * foods.length)];
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

function startSpin() {
  if (isSpinning) return;
  closeModal();
  isSpinning = true;
  document.getElementById("ab").disabled = true;
  document.getElementById("rn").className = "result-name";
  document.getElementById("rn").textContent = "🎹 转动中...";

  var targetIdx = Math.floor(Math.random() * n);
  var extraTurns = 3 + Math.random() * 3;
  var targetAngle = currentAngle + extraTurns * 2 * Math.PI - (targetIdx * (2 * Math.PI / n) + Math.PI / 2);
  var startAngle = currentAngle;
  var totalDelta = targetAngle - startAngle;
  var duration = 1500 + Math.random() * 1500;
  var startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3.5);
  }

  function animate(now) {
    var progress = Math.min((now - startTime) / duration, 1);
    currentAngle = startAngle + totalDelta * easeOut(progress);
    drawWheel();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      isSpinning = false;
      document.getElementById("ab").disabled = false;
      var result = getSelected();
      document.getElementById("rn").textContent = result.name;
      document.getElementById("rn").className = "result-name pop";
      addHistory(result);
      launchConfetti();
      setTimeout(function() { showModal(result); }, 700);
    }
  }

  requestAnimationFrame(animate);
}

function launchConfetti() {
  var confettiColors = ["#f093fb","#f5576c","#4facfe","#43e97b","#fa709a","#fee140","#a18cd1","#ff9a9e","#ff6b6b","#48dbfb"];
  for (var i = 0; i < 60; i++) {
    var el = document.createElement("div");
    var cw = 4 + Math.random() * 10;
    var ch = cw * (0.3 + Math.random() * 0.7);
    el.style.cssText = [
      "position:fixed",
      "width:" + cw + "px",
      "height:" + ch + "px",
      "background:" + confettiColors[Math.floor(Math.random() * confettiColors.length)],
      "border-radius:" + (Math.random() > 0.5 ? "50%" : "2px"),
      "left:" + (Math.random() * 100) + "vw",
      "top:-20px",
      "pointer-events:none",
      "z-index:9999",
      "opacity:" + (0.7 + Math.random() * 0.3),
      "transform:rotate(" + (Math.random() * 360) + "deg)",
      "animation:confettiFall " + (2 + Math.random() * 2.5) + "s ease-out forwards",
      "animation-delay:" + (Math.random() * 0.5) + "s"
    ].join(";") + ";";
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 5000);
  }
}

document.getElementById("ab").addEventListener("click", startSpin);
document.getElementById("sb").addEventListener("click", startSpin);
document.getElementById("modalSpinAgain").addEventListener("click", startSpin);
document.getElementById("closeBtn").addEventListener("click", closeModal);
document.getElementById("modal").addEventListener("click", function(e) { if (e.target === this) closeModal(); });
document.getElementById("hclr").addEventListener("click", function() { historyList = []; renderHistory(); });

window.addEventListener("resize", resizeCanvas);
resizeCanvas();
document.getElementById("badge").textContent = n + " 道菜";
</script>
